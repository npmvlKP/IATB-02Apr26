# Execution Mode Configuration: "paper" | "live"
# Paper trading is the default and safest mode for testing
execution_mode = "paper"

# Safety flag: Must be True for live trading to work
# Requires explicit confirmation via confirm_live_mode() function
live_trading_enabled = false

# Trading settings
default_exchange = "NSE"
default_market_type = "SPOT"
timezone = "Asia/Kolkata"
paper_trade_enforced = true

[broker]
name = "zerodha"

[network]
# Static IP address for SEBI compliance
# Replace with your actual static IP address
# Format: IPv4 address (e.g., "192.168.1.100")
static_ip = "192.168.1.100"

[algorithm]
algo_id = "iatb-algo-001"

[engine]
event_bus_max_queue_size = 1000
event_bus_batch_size = 100
max_tasks = 100

[data]
# Default data provider: "jugaad" | "kite" | "openalgo" | "yfinance"
# Risk 4 Migration: Feature flag for incremental DataProvider migration
data_provider_default = "kite"

# Enable dual-path A/B testing for migration validation
# When true, runs both default and fallback providers in parallel
enable_ab_testing = false

# Fallback provider for A/B testing (different from default)
data_provider_fallback = "jugaad"

# Maximum acceptable difference between providers (percentage)
# Exceeding this threshold will log warnings
ab_testing_max_diff_pct = 5.0

[observability]
# Enable observability features (metrics, traces, logs)
observability_enabled = true

# Exporter type: "otlp" | "prometheus" | "console"
observability_exporter_type = "otlp"

# Service name for observability
observability_service_name = "iatb"

# Service version for observability
observability_service_version = "0.1.0"

[storage]
# Storage type: "duckdb" | "sqlite" | "postgresql"
storage_type = "duckdb"

# Path to storage database
storage_path = "data/iatb.duckdb"

# Enable automatic backups
storage_backup_enabled = true

# Path to backup directory
storage_backup_path = "data/backups"