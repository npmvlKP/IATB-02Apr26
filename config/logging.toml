[logging]
level = "INFO"
format = "json"
timezone = "UTC"

[logging.fields]
service = "iatb"
environment = "development"

[logging.file]
enabled = true
path = "logs/iatb.json"
max_bytes = 10485760  # 10MB
backup_count = 5

[logging.modules]
"iatb.data" = "INFO"
"iatb.execution" = "DEBUG"
"iatb.risk" = "WARNING"