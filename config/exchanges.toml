# ===========================================
# OpenAlgo Broker Configuration
# Reference: marketcalls/openalgo (AGPL-3.0)
# ===========================================

[OPENALGO]
# Default broker configuration for OpenAlgo integration
broker = "zerodha"
api_base_url = "http://localhost:5000"  # OpenAlgo server endpoint
timeout_seconds = 30
max_retries = 3

[OPENALGO.zerodha]
# Zerodha-specific configuration via OpenAlgo adapter
broker = "zerodha"
api_key_env = "ZERODHA_API_KEY"
api_secret_env = "ZERODHA_API_SECRET"
access_token_env = "ZERODHA_ACCESS_TOKEN"
# Supported products: MIS (intraday), CNC (delivery), NRML (futures)
default_product = "MIS"
# Supported exchanges: NSE, BSE, MCX, CDS
supported_exchanges = ["NSE", "BSE", "MCX", "CDS"]
# Order validity: DAY, IOC, GTT
default_validity = "DAY"
# SEBI-mandated static IP validation
require_static_ip = true
