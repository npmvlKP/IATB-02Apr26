global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "trading-engine"
    static_configs:
      - targets: ["trading-engine:8000"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
