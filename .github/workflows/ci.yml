name: CI/CD Quality Gates

on:
  push:
    branches: [main, develop, production]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --with dev
      
      - name: Run ruff check
        run: poetry run ruff check src/ tests/
      
      - name: Run ruff format check
        run: poetry run ruff format --check src/ tests/
      
      - name: Run mypy strict
        run: poetry run mypy src/ --strict
      
      - name: Run bandit security check
        run: poetry run bandit -r src/ -q
      
      - name: Run pytest with coverage
        run: poetry run pytest --cov-fail-under=90
      
      - name: Run gitleaks
        id: gitleaks_action
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Fallback secret scan (if gitleaks action fails)
        if: steps.gitleaks_action.outcome != 'success'
        run: python scripts/secret_scan_fallback.py
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false