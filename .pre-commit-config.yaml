repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        exclude: ^(fix_.*\.py|git_sync_and_verify\.py|verify_and_sync\.py|check_g.*\.py|add_seeds.*\.py|remove_unused_ignore\.py|sync_to_remote\.py|verify_git_state\.py|verify_intraday_enforcement\.py)$
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi, jupyter]
        exclude: ^(fix_.*\.py|git_sync_and_verify\.py|verify_and_sync\.py|check_g.*\.py|add_seeds.*\.py|remove_unused_ignore\.py|sync_to_remote\.py|verify_git_state\.py|verify_intraday_enforcement\.py)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy strict
        args: [--strict, src/]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - types-requests

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: bandit security check
        args: [-r, src/, -q]
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: gitleaks-system
        name: gitleaks detect
        entry: gitleaks detect --source . --no-banner
        language: system
        pass_filenames: false
        always_run: true
