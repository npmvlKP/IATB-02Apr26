repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        exclude: ^(fix_.*\.py|git_sync_and_verify\.py|verify_and_sync\.py|verify_observability_optimization\.py|add_seeds_.*\.py|check_.*\.py|sync_to_remote\.py|validate_windows_g7_g8_g9_g10\.py)$
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi, jupyter]
        exclude: ^(fix_.*\.py|git_sync_and_verify\.py|verify_and_sync\.py|verify_observability_optimization\.py|add_seeds_.*\.py|check_.*\.py|sync_to_remote\.py|validate_windows_g7_g8_g9_g10\.py)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy strict
        args: [--strict, --ignore-missing-imports, --no-warn-unused-ignores, src/]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - types-requests
          - types-toml
          - pyotp
          - numpy
          - mlflow
          - optuna
          - tomli

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: bandit security check
        args: [-r, src/, -q]
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: gitleaks-system
        name: gitleaks detect
        entry: gitleaks detect --source . --no-banner
        language: system
        pass_filenames: false
        always_run: true
